{% extends 'base.html' %}

   {% block body %}
    <h1> All students </h1>
<table class="table table-striped">
    <tr>
        <th>id</th>
        <th>name</th>
        <th>Show</th>
        <th>Delete</th>
    </tr>
    {% for student in students %}
        <tr>
            <td> {{student.id }}</td>
             <td> {{student.name }}</td>
              <td> <a href="{% url 'students.show' student.id %}" class="btn btn-info"> Show</a></td>
            <td> <a href="{% url 'students.delete' student.id %}" class="btn btn-danger"> Delete</a></td>

        </tr>
    {% endfor %}
</table>

    {% endblock %}
