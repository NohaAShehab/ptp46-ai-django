<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
      <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #1a3c6e;
            --primary-light: #2a5ca8;
            --accent: #e8a838;
            --accent-dark: #c98a1e;
            --dark: #1a1a2e;
            --gray-100: #f4f6f9;
            --gray-200: #e2e6ec;
            --gray-600: #6b7280;
            --white: #ffffff;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.12);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--dark);
            line-height: 1.7;
            background: var(--gray-100);
        }

        /* ── Navigation ── */
        nav {
            background: var(--primary);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,.15);
        }
        nav .logo {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--white);
            letter-spacing: 2px;
            text-decoration: none;
        }
        nav .logo span { color: var(--accent); }
        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }
        nav ul a {
            color: var(--gray-200);
            text-decoration: none;
            font-weight: 500;
            transition: color .3s;
        }
        nav ul a:hover { color: var(--accent); }

        /* ── Hero ── */
        .hero {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 50%, var(--accent-dark) 100%);
            color: var(--white);
            text-align: center;
            padding: 5rem 2rem 4rem;
            position: relative;
            overflow: hidden;
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 80px;
            background: var(--gray-100);
            clip-path: ellipse(55% 100% at 50% 100%);
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: .5rem;
            letter-spacing: 1px;
        }
        .hero h1 span { color: var(--accent); }
        .hero p {
            font-size: 1.2rem;
            max-width: 650px;
            margin: 0 auto;
            opacity: .9;
        }

        /* ── Sections ── */
        section { padding: 4rem 2rem; }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .section-title {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .section-title h2 {
            font-size: 2rem;
            color: var(--primary);
            position: relative;
            display: inline-block;
        }
        .section-title h2::after {
            content: '';
            display: block;
            width: 60%;
            height: 4px;
            background: var(--accent);
            margin: .5rem auto 0;
            border-radius: 2px;
        }

        /* ── About Card ── */
        .about-card {
            background: var(--white);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: var(--shadow);
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }
        .about-card .icon-box {
            flex-shrink: 0;
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .about-card .icon-box svg { width: 48px; height: 48px; fill: var(--white); }
        .about-card p { color: var(--gray-600); font-size: 1.05rem; }

        /* ── Stats ── */
        .stats {
            background: var(--primary);
            color: var(--white);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            text-align: center;
        }
        .stat-item h3 {
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--accent);
        }
        .stat-item p {
            font-size: 1rem;
            margin-top: .3rem;
            opacity: .85;
        }

        /* ── Programs Grid ── */
        .programs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
        }
        .program-card {
            background: var(--white);
            border-radius: 14px;
            padding: 2rem 1.5rem;
            text-align: center;
            box-shadow: var(--shadow);
            transition: transform .3s, box-shadow .3s;
            border-top: 4px solid var(--accent);
        }
        .program-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
        }
        .program-card .card-icon {
            width: 60px;
            height: 60px;
            background: var(--gray-100);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }
        .program-card .card-icon svg { width: 30px; height: 30px; fill: var(--primary); }
        .program-card h3 { font-size: 1.15rem; color: var(--primary); margin-bottom: .5rem; }
        .program-card p { font-size: .93rem; color: var(--gray-600); }

        /* ── Departments ── */
        .departments {
            background: var(--gray-200);
        }
        .departments .section-title p {
            color: var(--gray-600);
            max-width: 650px;
            margin: -.8rem auto 2.5rem;
            font-size: 1.05rem;
        }
        .dept-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        .dept-card {
            background: var(--white);
            border-radius: 14px;
            padding: 1.8rem 1.6rem;
            box-shadow: var(--shadow);
            display: flex;
            gap: 1.2rem;
            align-items: flex-start;
            transition: transform .3s, box-shadow .3s;
            border-left: 5px solid var(--accent);
            position: relative;
            overflow: hidden;
        }
        .dept-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(26,60,110,.03), transparent);
            pointer-events: none;
        }
        .dept-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        .dept-card .dept-icon {
            flex-shrink: 0;
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dept-card .dept-icon svg {
            width: 26px;
            height: 26px;
            fill: var(--white);
        }
        .dept-card .dept-info h3 {
            font-size: 1.05rem;
            color: var(--primary);
            margin-bottom: .3rem;
        }
        .dept-card .dept-info p {
            font-size: .88rem;
            color: var(--gray-600);
            line-height: 1.5;
        }
        .dept-card .dept-info .tech-tags {
            display: flex;
            flex-wrap: wrap;
            gap: .4rem;
            margin-top: .6rem;
        }
        .dept-card .dept-info .tech-tag {
            background: var(--gray-100);
            color: var(--primary);
            font-size: .75rem;
            font-weight: 600;
            padding: .2rem .6rem;
            border-radius: 20px;
            border: 1px solid var(--gray-200);
        }

        /* ── Values ── */
        .values-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .value-item {
            background: var(--white);
            border-radius: 14px;
            padding: 2rem;
            box-shadow: var(--shadow);
            display: flex;
            gap: 1.2rem;
            align-items: flex-start;
        }
        .value-item .bullet {
            flex-shrink: 0;
            width: 42px;
            height: 42px;
            background: var(--accent);
            color: var(--white);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.1rem;
        }
        .value-item h4 { font-size: 1.05rem; color: var(--primary); margin-bottom: .3rem; }
        .value-item p { font-size: .93rem; color: var(--gray-600); }

        /* ── Branches ── */
        .branches-flex {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
        }
        .branch-tag {
            background: var(--white);
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: .6rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: .95rem;
            transition: .3s;
        }
        .branch-tag:hover {
            background: var(--primary);
            color: var(--white);
        }

        /* ── Contact ── */
        .contact-bar {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: var(--white);
            text-align: center;
            padding: 3rem 2rem;
        }
        .contact-bar h2 { font-size: 1.8rem; margin-bottom: .5rem; }
        .contact-bar p { opacity: .85; margin-bottom: 1.5rem; }
        .contact-bar .btn {
            display: inline-block;
            padding: .8rem 2.5rem;
            background: var(--accent);
            color: var(--dark);
            font-weight: 700;
            border-radius: 50px;
            text-decoration: none;
            transition: .3s;
        }
        .contact-bar .btn:hover { background: var(--white); }

        /* ── Footer ── */
        footer {
            background: var(--dark);
            color: var(--gray-200);
            text-align: center;
            padding: 1.5rem 2rem;
            font-size: .9rem;
        }
        footer span { color: var(--accent); font-weight: 600; }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .about-card { flex-direction: column; text-align: center; }
            nav ul { gap: 1rem; font-size: .9rem; }
        }
    </style>
</head>
<body>
<!-- Navigation -->
<nav>
    <a href="#" class="logo"><span>ITI</span> Institute</a>
    <ul>
        <li><a href="#">Students Home </a></li>
        <li><a href="{% url 'departments.about'%}">Departments</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<div style="background-color: antiquewhite; color: brown">
  {% block content %}
  {% endblock %}
</div>

<div style="background-color: rosybrown; color: green">
  {% block body %}
  {% endblock %}
</div>





<!-- Footer -->
<footer>
    <p>&copy; 2026 <span>ITI</span> — Information Technology Institute. All rights reserved.</p>
</footer>
</body>
</html>
